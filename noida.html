<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noida | Leaderboard</title>
  <meta name="description" content="Live Noida leaderboard for Delhi Padel Collective.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="noida">
  <main class="page-wrap">
    <section class="leaderboard-card">
      <header class="topbar">
        <div class="brand-lockup">
        <a class="brand-link" href="https://dpc-padel.github.io/DPC/">
            <img class="brand-logo" src="dpc-green-logo.svg" alt="Delhi Padel Collective logo">
          </a>
        </div>

        <div class="topbar-tools">
          <label class="page-switcher">
            <span class="sr-only">Select leaderboard</span>
            <select id="pageSelector" aria-label="Select leaderboard page">
              <option value="index.html">First Serve</option>
              <option value="break-point.html">Break Point</option>
              <option value="noida.html">Noida</option>
            </select>
          </label>
          <div class="topbar-meta">
            <p>Leaderboard</p>
          </div>
        </div>
      </header>

      <section class="hero-banner">
        <p class="slash">//</p>
        <div class="hero-copy">
          <h1>Noida</h1>
          <p>Leaderboard</p>
        </div>
      </section>

      <section class="standings-section">
        <div class="standings-head">
          <div>
            <p class="section-kicker">Overall Standings</p>
          </div>
          <button id="refreshButton" class="refresh-button" type="button" hidden>Refresh</button>
        </div>

        <div id="statusMessage" class="status-message" aria-live="polite"></div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="rank-col">#</th>
                <th>Player</th>
                <th>MP</th>
                <th>PTS</th>
              </tr>
            </thead>
            <tbody id="rankingBody">
              <tr>
                <td colspan="4">Loading leaderboard...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <footer class="card-footer">
        <div class="footer-rule"></div>
        <p class="footer-note">MP = matches played · PTS = total score points</p>
        <div class="footer-meta">
          <span>Delhi//PadelCollective</span>
          <span>@DELHIPADELCOLLECTIVE</span>
        </div>
      </footer>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
